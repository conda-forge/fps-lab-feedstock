schema_version: 1

context:
  version: "0.11.5"

package:
  name: fps-lab
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-lab/fps_lab-${{ version }}.tar.gz
    sha256: cd1ecf06fb30785c33af0d1be41eca119bb2c7a96cc4ac2cba709a9cbe716737

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio
    - babel
    - fastapi-core
    - fps
    - json5
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0
    - jupyverse-frontend >=0.1.0,<0.2.0
    - jupyverse-jupyterlab >=0.1.0,<0.2.0
    - jupyverse-lab >=0.3.0,<0.4.0
    - starlette

tests:
  - python:
      imports: fps_lab
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/lab
  summary: An FPS plugin for the JupyterLab/Notebook API

extra:
  recipe-maintainers:
    - davidbrochart
